services:
  currencymock.niffler.dc:
    container_name: currencymock.niffler.dc
    image: adven27/grpc-wiremock:latest
    volumes:
      - ./wiremock/grpc/:/wiremock/
      - ./internal/protos:/proto
    ports:
      - 8888:8888
      - 8094:8094
    environment:
      - GRPC_SERVER_PORT=8094
      - GRPC_PROTO_DIR=/wiremock/protos

